syntax = "proto3";

package accrescent.parcelo.impl.v1;

option java_multiple_files = true;
option java_package = "app.accrescent.parcelo.impl.v1";

// A "next page" token returned in ListAppEditsResponse
message ListAppEditsPageToken {
  // The last app edit ID returned in the ListAppEditsResponse. Required.
  optional string last_app_edit_id = 1;
}

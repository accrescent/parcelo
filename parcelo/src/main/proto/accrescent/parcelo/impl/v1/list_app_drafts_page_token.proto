syntax = "proto3";

package accrescent.parcelo.impl.v1;

option java_multiple_files = true;
option java_package = "app.accrescent.parcelo.impl.v1";

// A "next page" token returned in ListAppDraftsResponse.
message ListAppDraftsPageToken {
  // The last app draft ID returned in the ListAppDraftsResponse. Required.
  optional string last_app_draft_id = 1;
}

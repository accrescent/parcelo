syntax = "proto3";

package accrescent.parcelo.impl.v1;

option java_multiple_files = true;
option java_package = "app.accrescent.parcelo.impl.v1";

// A "next page" token returned in a ListAppsResponse.
message ListAppsPageToken {
  // The last app ID returned in the ListAppsResponse. Required.
  optional string last_app_id = 1;
}
